<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeroSathi Payment - Nabil Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .checkout-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 100%;
            padding: 48px 40px;
        }
        .checkout-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-container {
            margin-bottom: 24px;
        }
        .logo-image {
            max-width: 120px;
            height: auto;
            margin-bottom: 12px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .logo-label {
            color: #2d5016;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .checkout-header h1 {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .checkout-header p {
            color: #6b7280;
            font-size: 14px;
            font-weight: 400;
        }
        .amount-display {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: center;
        }
        .amount-label {
            color: #6b7280;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .amount-value {
            color: #1a1a1a;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .amount-currency {
            color: #6b7280;
            font-size: 18px;
            margin-left: 4px;
            font-weight: 500;
        }
        .info-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-left: 3px solid #2d5016;
            padding: 16px;
            margin-bottom: 32px;
            border-radius: 8px;
        }
        .info-box p {
            color: #4b5563;
            font-size: 13px;
            line-height: 1.6;
            margin: 0;
        }
        .pay-button {
            width: 100%;
            background: #2d5016;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(45, 80, 22, 0.2);
        }
        .pay-button:hover {
            background: #3a6520;
            box-shadow: 0 4px 12px rgba(45, 80, 22, 0.3);
            transform: translateY(-1px);
        }
        .pay-button:active {
            transform: translateY(0);
        }
        .pay-button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 24px;
        }
        .loading.active {
            display: block;
        }
        .spinner {
            border: 2px solid #e5e7eb;
            border-top: 2px solid #2d5016;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-left: 3px solid #ef4444;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body data-api-base-url="{{API_BASE_URL}}">
    <div class="checkout-container">
        <div class="checkout-header">
            <div class="logo-container">
                <img src="/pay-by-card-logo.png" alt="Pay by Card" class="logo-image" />
                <div class="logo-label">Pay by Card</div>
            </div>
            <h1>Payment Checkout</h1>
            <p>Complete your payment securely</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="amount-display">
            <div class="amount-label">Total Amount</div>
            <div class="amount-value">
                NPR <span class="amount-currency">1.00</span>
            </div>
        </div>
        
        <div class="info-box">
            <p><strong>Note:</strong> You will be redirected to Nabil Bank's secure payment page to enter your card details. Your payment is secured by Nabil Bank.</p>
        </div>
        
        <form id="checkoutForm">
            <button type="submit" class="pay-button" id="payButton" data-button-label="Pay">
                Pay
            </button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 12px; color: #6b7280; font-size: 13px;">Processing...</p>
        </div>
    </div>
    
    <!-- Load external JavaScript file (avoids CSP inline script issues) -->
    <script src="/checkout.js"></script>
</body>
</html>
